plugins {
    id 'com.android.application'
}

android {
    namespace 'com.tencent.nanodetncnn'
    compileSdk 33
    ndkVersion "29.0.14206865"

    defaultConfig {
        applicationId "com.tencent.nanodetncnn"
        archivesBaseName = "$applicationId"
        minSdkVersion 24
        targetSdkVersion 35

        // 你的设备疑似 32 位处理器，先只打 armeabi-v7a。
        // org.uvccamera/lib 和 ncnn 都会按这个 ABI 过滤打包。
        ndk {
            abiFilters "armeabi-v7a"
        }

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    externalNativeBuild {
        cmake {
            version "3.31.5"
            path file('src/main/jni/CMakeLists.txt')
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

dependencies {
    implementation 'com.android.support:support-v4:24.0.0'

    // 真 UVC 摄像头输入：直接通过 USB Host/libuvc 打开 UVC 摄像头，
    // 不依赖系统 Camera2 是否把 USB 摄像头暴露出来。
    implementation 'org.uvccamera:lib:0.0.13'
}
